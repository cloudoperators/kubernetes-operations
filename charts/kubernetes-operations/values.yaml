global:
  # -- Common labels to add to all resources
  ##
  commonLabels: {}

## -- default rules for monitoring the cluster
##
prometheusRules:
  # -- Enables PrometheusRule resources to be created
  create: true

  # -- Label selectors for the Prometheus rules to be picked up by Prometheus.
  ruleSelectors:
    # - name: plugin
    #   value: kube-monitoring
    # - name: prometheus
    #   value: kubernetes

  # -- Labels for PrometheusRules
  labels: {}

  # -- Annotations for PrometheusRules
  annotations: {}

  # -- Additional labels for PrometheusRule alerts
  ## This is useful for adding additional labels such as "support_group" or "service" for the routing of alerts to each rule
  additionalRuleLabels:
    # support_group: support
    # service: my-service

  # -- Additional annotations for PrometheusRule alerts
  additionalRuleAnnotations: {}

  # -- Disabled PrometheusRule alerts
  disabled: {}
  # KubernetesApiServerDown: true
  # KubeletDown: true

  # -- Enrich pod- and deployment-level alert expressions with labels from kube_pod_labels / kube_deployment_labels.
  # Provide a list of kube-state-metrics label names to include in group_left().
  # Affects: KubernetesPodRestartingTooMuch, KubePodNotReady (join on pod+namespace),
  #          KubernetesDeploymentReplicasMismatch (join on namespace+deployment).
  kubeLabels: []
  # - label_app
  # - label_team
  # - label_environment

  # -- The label value pair that marks a Kubernetes node as 'in maintenance'
  NodeInMaintenance:
    label: maintenance_state
    value: in-maintenance

## Create default dashboards for monitoring the cluster
##
dashboards:
  # -- Enables ConfigMap resources with dashboards to be created
  create: true

  # -- Label selectors for the Perses dashboards to be picked up by Perses.
  persesSelectors:
    - name: perses.dev/resource
      value: '"true"'
