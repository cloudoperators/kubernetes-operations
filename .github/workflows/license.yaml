name: Check & Fix License Header
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate-token:
    name: Generate GitHub App Token
    runs-on: [ ubuntu-latest ]
    outputs:
      token: ${{ steps.github-app-token.outputs.token }}
    steps:
      - name: Generate GitHub App Token
        id: github-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CLOUDOPERATOR_APP_ID }}
          private-key: ${{ secrets.CLOUDOPERATOR_APP_PRIVATE_KEY }}
          permission-contents: write

  apply-license-header:
      name: Apply LicenceHeader
      runs-on: [ ubuntu-latest ]
      needs: generate-token
      permissions:
        contents: write

      steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with: 
          token: ${{ needs.generate-token.outputs.token != '' && needs.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check License Header
        uses: apache/skywalking-eyes/header@5c5b974209f0de5d905f37deb69369068ebfc15c # v0.7.0
        with:
            config: .github/licenserc.yaml
            mode: fix

      - name: Apply Changes
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
            author_name: License Bot
            author_email: license_bot@github.com
            message: 'Automatic application of license header'
